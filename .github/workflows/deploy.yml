# Name of your workflow (visible on GitHub)
name: Deploy Next.js App to cPanel

# Trigger the workflow on pushes to the 'main' branch
on:
  push:
    branches: [ main ]
  # Allows you to manually run the workflow from GitHub's Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      # Use a Node.js version >= 18.17 and compatible with your project
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
        env:
            ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # Step 4: Build the Next.js application
      # Next 16 with Turbopack outputs to ./build (not ./.next).
      # output: 'standalone' in next.config.ts produces build/standalone/.
      - name: Build Next.js app
        run: npm run build

      # Step 5: Copy static assets into the standalone bundle.
      # The standalone server expects: public/ next to its server.js, and
      # static/ inside <distDir>/ — here that is build/standalone/build/static.
      - name: Copy static assets to standalone directory
        run: |
          cp -r public build/standalone/public
          cp -r build/static build/standalone/build/static

      # Step 6: Deploy to your cPanel server via FTP
      # Only the minimal 'standalone' folder is uploaded for a faster deploy.
      # IMPORTANT: the action's default exclude list drops `node_modules/**`,
      # which is correct for a normal Next app but wrong for a standalone
      # bundle — Next.js trace-collects the runtime deps into
      # build/standalone/node_modules/. We override `exclude` to keep them.
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/standalone/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
          # TEMPORARY: wipes the remote dir before upload. Re-comment after a
          # successful deploy so day-to-day pushes stay incremental.
        #   dangerous-clean-slate: true
          # Bumped from the 30s default — the standalone bundle has ~1500
          # files and the cPanel FTP control socket goes idle long enough
          # between commands that the default times out.
          timeout: 120000
          # Verbose logging makes it obvious where a future hang is, if any.
          log-level: verbose